<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cargando Novex Browser</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      font-family: Arial, sans-serif;
      overflow: hidden;
      background: transparent;
    }

    .splash {
      width: 100%;
      height: 100%;
      border-radius: 32px;
      background:
        radial-gradient(circle at center, rgba(255, 47, 109, 0.24), transparent 44%),
        linear-gradient(145deg, rgba(10, 5, 17, 0.98), rgba(25, 9, 35, 0.96));
      border: 1px solid rgba(255, 47, 109, 0.42);
      box-shadow:
        0 0 30px rgba(255, 47, 109, 0.35),
        0 0 80px rgba(168, 85, 247, 0.22);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      position: relative;
    }

    .splash::before {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      pointer-events: none;
    }

    .content {
      text-align: center;
      z-index: 2;
      width: 82%;
    }

    .logo-wrap {
      width: 118px;
      height: 118px;
      margin: 0 auto 18px;
      border-radius: 30px;
      padding: 5px;
      background: linear-gradient(135deg, #ff2f6d, #a855f7);
      box-shadow:
        0 0 22px rgba(255, 47, 109, 0.65),
        0 0 48px rgba(168, 85, 247, 0.32);
      animation: pulse 1.6s ease-in-out infinite;
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      border-radius: 26px;
      object-fit: cover;
      display: block;
    }

    h1 {
      margin: 0;
      font-size: 34px;
      letter-spacing: 1px;
      font-weight: 900;
      background: linear-gradient(90deg, #ff2f6d, #ff7bb2, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      margin: 10px 0 26px;
      color: #d9cdf1;
      font-size: 15px;
    }

    .loader {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 70, 150, 0.25);
    }

    .loader-bar {
      width: 42%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff2f6d, #a855f7);
      box-shadow: 0 0 18px rgba(255, 47, 109, 0.75);
      animation: load 1.15s ease-in-out infinite;
    }

    .status {
      margin-top: 15px;
      color: #a99abd;
      font-size: 13px;
    }

    @keyframes load {
      0% {
        transform: translateX(-110%);
      }
      100% {
        transform: translateX(260%);
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        filter: brightness(1);
      }
      50% {
        transform: scale(1.045);
        filter: brightness(1.2);
      }
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="content">
      <div class="logo-wrap">
        <img src="assets/novex-logo.png" alt="Novex Logo" />
      </div>

      <h1>NOVEX BROWSER</h1>
      <p>Iniciando Novex Browser...</p>

      <div class="loader">
        <div class="loader-bar"></div>
      </div>

      <div class="status">Preparando tu navegador</div>
    </div>
  </div>
</body>
</html>
